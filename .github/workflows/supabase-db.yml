name: Supabase DB

on:
  pull_request:
    paths:
      - "supabase/**"
      - ".github/workflows/supabase-db.yml"
  push:
    branches:
      - main
    paths:
      - "supabase/**"
      - ".github/workflows/supabase-db.yml"

jobs:
  validate-migrations:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase stack
        run: supabase start

      - name: Verify migrations from a clean database
        run: supabase db reset

      - name: Stop local Supabase stack
        if: always()
        run: supabase stop

  push-production-migrations:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Skip when required secrets are missing
        if: env.SUPABASE_ACCESS_TOKEN == '' || env.SUPABASE_PROJECT_ID == '' || env.SUPABASE_DB_PASSWORD == ''
        run: echo "Supabase production migration skipped because required GitHub Actions secrets are missing."

      - name: Authenticate Supabase CLI
        if: env.SUPABASE_ACCESS_TOKEN != '' && env.SUPABASE_PROJECT_ID != '' && env.SUPABASE_DB_PASSWORD != ''
        run: supabase login --token "$SUPABASE_ACCESS_TOKEN"

      - name: Link to production project
        if: env.SUPABASE_ACCESS_TOKEN != '' && env.SUPABASE_PROJECT_ID != '' && env.SUPABASE_DB_PASSWORD != ''
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"

      - name: Push pending migrations
        if: env.SUPABASE_ACCESS_TOKEN != '' && env.SUPABASE_PROJECT_ID != '' && env.SUPABASE_DB_PASSWORD != ''
        run: supabase db push --include-all
